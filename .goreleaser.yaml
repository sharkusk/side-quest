version: 2

project_name: side-quest

builds:
  - id: side-quest
    main: ./cmd/side-quest
    binary: side-quest
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: default
    name_template: "side-quest_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt
  algorithm: sha256

# The release notes are the annotated tag's own message, not an auto-generated
# commit list. Disabling the changelog and setting the header to {{ .TagBody }}
# means the curated summary written into `git tag -a vX.Y.Z` is exactly what the
# GitHub release shows — write the tag message thoughtfully and it carries through
# (SQ-0078).
changelog:
  disable: true

release:
  draft: false
  header: |
    {{ .TagBody }}
