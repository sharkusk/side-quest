name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # The release is cut straight from the tag. That commit was already validated by
  # ci.yml on the push to main (we only tag once CI is green there), so re-running
  # the full 3-OS matrix here would just repeat that run on the same SHA — dropped
  # to kill the redundant per-release matrix (SQ-0095). This supersedes the SQ-0087
  # gate, which mattered only while main pushes weren't otherwise tested; keeping
  # main green before tagging is now the trust boundary.
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          # Track the toolchain floor from the go.mod `go` directive (currently
          # 1.25) so a release is always cut with the required Go — one source of
          # truth, no drift when the directive is bumped (SQ-0006).
          go-version-file: 'go.mod'
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
