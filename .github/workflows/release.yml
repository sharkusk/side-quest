name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Gate the release on the full test matrix — build/vet/test on all three OSes —
  # so a red build can never tag a release (SQ-0087). Mirrors ci.yml; the Windows
  # job is the load-bearing one (real hook + provisioning paths).
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  goreleaser:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          # Track the toolchain floor from the go.mod `go` directive (currently
          # 1.25) so a release is always cut with the required Go — one source of
          # truth, no drift when the directive is bumped (SQ-0006).
          go-version-file: 'go.mod'
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
