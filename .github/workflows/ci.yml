name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest is the point of the matrix (SQ-0034): it runs the real
        # end-to-end hook test (TestEndToEndHooksDriveLinking) under Git for
        # Windows' MSYS sh, confirming the extensionless sh shims actually execute
        # and invoke the side-quest .exe by path — something no Unix runner can
        # prove. ubuntu/macos keep the common platforms honest too.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          # One source of truth for the toolchain: the go.mod `go` directive.
          go-version-file: 'go.mod'
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...
